apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: mercadol-pithing
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: web
        image: mercadol-pithing/web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: mercadol-pithing-config
              key: NODE_ENV
        - name: WEB_PORT
          valueFrom:
            configMapKeyRef:
              name: mercadol-pithing-config
              key: WEB_PORT
        - name: NEXT_PUBLIC_API_URL
          value: "http://api:3001"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: mercadol-pithing
spec:
  selector:
    app: web
  ports:
  - port: 3000
    targetPort: 3000
  type: ClusterIP
