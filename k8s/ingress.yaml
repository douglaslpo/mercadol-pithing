apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mercadol-pithing-ingress
  namespace: mercadol-pithing
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - mercadol-pithing.example.com
    secretName: mercadol-pithing-tls
  rules:
  - host: mercadol-pithing.example.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 3001
      - path: /embeddings
        pathType: Prefix
        backend:
          service:
            name: embeddings
            port:
              number: 3002
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web
            port:
              number: 3000
