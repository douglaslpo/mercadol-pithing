apiVersion: v2
name: mercadol-pithing
description: MercadoL Pithing - Descoberta de Produtos
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ecommerce
  - marketplace
  - product-discovery
  - machine-learning
home: https://github.com/mercadol-pithing/mercadol-pithing
sources:
  - https://github.com/mercadol-pithing/mercadol-pithing
maintainers:
  - name: Douglas
    email: douglas@mercadol-pithing.com
dependencies:
  - name: postgresql
    version: 12.1.2
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.3.7
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: minio
    version: 12.1.3
    repository: https://charts.bitnami.com/bitnami
    condition: minio.enabled
  - name: prometheus
    version: 25.8.0
    repository: https://prometheus-community.github.io/helm-charts
    condition: prometheus.enabled
  - name: grafana
    version: 6.57.4
    repository: https://grafana.github.io/helm-charts
    condition: grafana.enabled
  - name: jaeger
    version: 0.69.0
    repository: https://jaegertracing.github.io/helm-charts
    condition: jaeger.enabled
  - name: elasticsearch
    version: 19.8.0
    repository: https://helm.elastic.co
    condition: elasticsearch.enabled
  - name: kibana
    version: 10.2.0
    repository: https://helm.elastic.co
    condition: kibana.enabled
