apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mercadol-pithing.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mercadol-pithing.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.app.environment | quote }}
  API_PORT: {{ .Values.api.service.port | quote }}
  WEB_PORT: {{ .Values.web.service.port | quote }}
  EMBEDDINGS_PORT: {{ .Values.embeddings.service.port | quote }}
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "mercadol_pithing"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "product-images"
  MINIO_ACCESS_KEY: "minioadmin"
  MINIO_SECRET_KEY: "minioadmin"
  ALIYUN_REGION: "cn-hangzhou"
  ENABLE_SHOPEE_INTEGRATION: "false"
  ENABLE_WISH_INTEGRATION: "false"
  ENABLE_ALIBABA_IMAGE_SEARCH: "true"
