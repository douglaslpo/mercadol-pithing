{{- if .Values.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.clusterIssuer }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: {{ .Values.certManager.clusterIssuer }}
    solvers:
    - http01:
        ingress:
          class: nginx
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mercadol-pithing.certManagerName" . }}-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mercadol-pithing.labels" . | nindent 4 }}
spec:
  secretName: {{ include "mercadol-pithing.certManagerName" . }}-tls
  issuerRef:
    name: {{ .Values.certManager.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
  {{- range .Values.ingress.hosts }}
  - {{ .host }}
  {{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mercadol-pithing.certManagerName" . }}-wildcard-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mercadol-pithing.labels" . | nindent 4 }}
spec:
  secretName: {{ include "mercadol-pithing.certManagerName" . }}-wildcard-tls
  issuerRef:
    name: {{ .Values.certManager.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
  {{- range .Values.ingress.hosts }}
  - "*.{{ .host }}"
  - {{ .host }}
  {{- end }}
{{- end }}
