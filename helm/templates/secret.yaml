apiVersion: v1
kind: Secret
metadata:
  name: {{ include "mercadol-pithing.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mercadol-pithing.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded secrets
  # Use: echo -n "your-secret" | base64
  POSTGRES_PASSWORD: {{ .Values.postgresql.auth.postgresPassword | b64enc | quote }}
  REDIS_PASSWORD: {{ .Values.redis.auth.password | b64enc | quote }}
  JWT_SECRET: {{ .Values.jwt.secret | default "your-super-secret-jwt-key-change-in-production" | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.minio.auth.rootPassword | b64enc | quote }}
  MELI_CLIENT_ID: {{ .Values.meli.clientId | default "" | b64enc | quote }}
  MELI_CLIENT_SECRET: {{ .Values.meli.clientSecret | default "" | b64enc | quote }}
  MELI_REDIRECT_URI: {{ .Values.meli.redirectUri | default "" | b64enc | quote }}
  SHOPEE_PARTNER_ID: {{ .Values.shopee.partnerId | default "" | b64enc | quote }}
  SHOPEE_PARTNER_KEY: {{ .Values.shopee.partnerKey | default "" | b64enc | quote }}
  WISH_CLIENT_ID: {{ .Values.wish.clientId | default "" | b64enc | quote }}
  WISH_CLIENT_SECRET: {{ .Values.wish.clientSecret | default "" | b64enc | quote }}
  WISH_REDIRECT_URI: {{ .Values.wish.redirectUri | default "" | b64enc | quote }}
  ALIYUN_ACCESS_KEY_ID: {{ .Values.alibaba.accessKeyId | default "" | b64enc | quote }}
  ALIYUN_ACCESS_KEY_SECRET: {{ .Values.alibaba.accessKeySecret | default "" | b64enc | quote }}
