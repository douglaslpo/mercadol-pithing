{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mercadol-pithing.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mercadol-pithing.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas | default .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "mercadol-pithing.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "mercadol-pithing.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "mercadol-pithing.serviceAccountName" . }}
      containers:
      - name: api
        image: "{{ .Values.global.imageRegistry }}{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.api.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.api.service.port }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.app.environment | quote }}
        - name: API_PORT
          value: {{ .Values.api.service.port | quote }}
        - name: DATABASE_URL
          value: "postgres://postgres:$(POSTGRES_PASSWORD)@postgres:5432/mercadol_pithing"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: POSTGRES_PASSWORD
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis:6379"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: JWT_SECRET
        - name: MELI_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: MELI_CLIENT_ID
        - name: MELI_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: MELI_CLIENT_SECRET
        - name: MELI_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: MELI_REDIRECT_URI
        - name: SHOPEE_PARTNER_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: SHOPEE_PARTNER_ID
        - name: SHOPEE_PARTNER_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: SHOPEE_PARTNER_KEY
        - name: WISH_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: WISH_CLIENT_ID
        - name: WISH_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: WISH_CLIENT_SECRET
        - name: WISH_REDIRECT_URI
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: WISH_REDIRECT_URI
        - name: ALIYUN_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: ALIYUN_ACCESS_KEY_ID
        - name: ALIYUN_ACCESS_KEY_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "mercadol-pithing.secretName" . }}
              key: ALIYUN_ACCESS_KEY_SECRET
        - name: ALIYUN_REGION
          valueFrom:
            configMapKeyRef:
              name: {{ include "mercadol-pithing.configMapName" . }}
              key: ALIYUN_REGION
        - name: MINIO_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: {{ include "mercadol-pithing.configMapName" . }}
              key: MINIO_ENDPOINT
        - name: MINIO_BUCKET
          valueFrom:
            configMapKeyRef:
              name: {{ include "mercadol-pithing.configMapName" . }}
              key: MINIO_BUCKET
        - name: MINIO_ACCESS_KEY
          valueFrom:
            configMapKeyRef:
              name: {{ include "mercadol-pithing.configMapName" . }}
              key: MINIO_ACCESS_KEY
        - name: MINIO_SECRET_KEY
          valueFrom:
            configMapKeyRef:
              name: {{ include "mercadol-pithing.configMapName" . }}
              key: MINIO_SECRET_KEY
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.api.resources | nindent 10 }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
{{- end }}

{{- if .Values.web.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mercadol-pithing.fullname" . }}-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mercadol-pithing.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas | default .Values.app.replicas }}
  selector:
    matchLabels:
      {{- include "mercadol-pithing.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "mercadol-pithing.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: {{ include "mercadol-pithing.serviceAccountName" . }}
      containers:
      - name: web
        image: "{{ .Values.global.imageRegistry }}{{ .Values.web.image.repository }}:{{ .Values.web.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.web.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.web.service.port }}
          protocol: TCP
        env:
        - name: NODE_ENV
          value: {{ .Values.app.environment | quote }}
        - name: WEB_PORT
          value: {{ .Values.web.service.port | quote }}
        - name: NEXT_PUBLIC_API_URL
          value: "http://{{ include "mercadol-pithing.fullname" . }}-api:{{ .Values.api.service.port }}"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          {{- toYaml .Values.web.resources | nindent 10 }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
{{- end }}

